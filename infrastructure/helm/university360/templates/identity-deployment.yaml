apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-identity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: {{ .Release.Name }}-identity
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-identity
    spec:
      containers:
        - name: identity
          image: "{{ .Values.services.identity.image }}:{{ .Values.services.identity.tag }}"
          ports:
            - containerPort: 8080
