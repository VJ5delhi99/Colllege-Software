services:
  mysql:
    container_name: university360-mysql
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: university360
      MYSQL_USER: app
      MYSQL_PASSWORD: app123!
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "13306:3306"
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d

  redis:
    container_name: university360-redis
    image: redis:7.4
    ports:
      - "16379:6379"

  rabbitmq:
    container_name: university360-rabbitmq
    image: rabbitmq:3.13-management
    ports:
      - "15672:5672"
      - "15673:15672"

  minio:
    container_name: university360-minio
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "19000:9000"
      - "19001:9001"

  clickhouse:
    container_name: university360-clickhouse
    image: clickhouse/clickhouse-server:25.1
    ports:
      - "18123:8123"
      - "19009:9000"

  identity-service:
    container_name: university360-identity-service
    build:
      context: ../..
      dockerfile: services/identity-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7001:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
      authorization-service:
        condition: service_started

  authorization-service:
    container_name: university360-authorization-service
    build:
      context: ../..
      dockerfile: services/authorization-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7016:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  academic-service:
    container_name: university360-academic-service
    build:
      context: ../..
      dockerfile: services/academic-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7002:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started

  attendance-service:
    container_name: university360-attendance-service
    build:
      context: ../..
      dockerfile: services/attendance-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "7003:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started
      face-recognition-service:
        condition: service_started

  face-recognition-service:
    container_name: university360-face-recognition-service
    build:
      context: ../..
      dockerfile: services/face-recognition-service/Dockerfile
    ports:
      - "7100:8000"

  communication-service:
    container_name: university360-communication-service
    build:
      context: ../..
      dockerfile: services/communication-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
